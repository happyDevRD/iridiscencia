name: Build y publicar (iridiscencia)

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_WEB3FORMS_KEY=${{ secrets.WEB3FORMS_KEY }}
          tags: |
            ghcr.io/happydevrd/iridiscencia-web:latest
            ghcr.io/happydevrd/iridiscencia-web:${{ github.sha }}
